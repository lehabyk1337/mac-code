name: Build Expert Sniper Worker

on:
  push:
    paths:
      - 'research/expert-sniper/runpod-worker/**'
  workflow_dispatch:  # manual trigger from GitHub UI

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: walter-grace/expert-sniper-worker

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # CUDA build takes ~20-30 min
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        # CUDA build needs ~15 GB, GitHub runners have ~30 GB
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./research/expert-sniper/runpod-worker
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
